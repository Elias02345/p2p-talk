# p2p-talk stack — Standard / CloudGate mode.
# The Node signaling server is exposed on the host so a separate CloudGate VM can
# reach it over plain HTTP at <server-ip>:<PORT> (no domain/TLS required).
# Set SIGNALING_BIND in .env to 127.0.0.1 if you instead front it with a local
# reverse proxy on the same box.
# coturn uses host networking because TURN relay needs a wide UDP/TCP port range
# and must advertise the host's reachable address in ICE candidates.

name: p2ptalk

services:
  signaling:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: p2ptalk-signaling
    env_file: ../.env
    ports:
      - "${SIGNALING_BIND:-0.0.0.0}:${PORT:-3000}:3000"
    volumes:
      - p2ptalk-data:/app/data
    restart: unless-stopped

  # Self-hosted relay — only started with TURN_MODE=coturn (compose profile
  # "relay"). Behind a Cloudflare Tunnel use TURN_MODE=cloudflare/none instead;
  # coturn then never runs and can't crash-loop the stack.
  coturn:
    image: coturn/coturn:4.6
    container_name: p2ptalk-coturn
    profiles: ["relay"]
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    command: ["-c", "/etc/coturn/turnserver.conf"]

  # Optional bundled Cloudflare Tunnel (enabled via compose profile "tunnel"
  # when TUNNEL_TOKEN is set). Skip this if CloudGate manages the tunnel.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: p2ptalk-cloudflared
    profiles: ["tunnel"]
    network_mode: host
    restart: unless-stopped
    command: ["tunnel", "--no-autoupdate", "run", "--token", "${TUNNEL_TOKEN}"]

volumes:
  p2ptalk-data:
